<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TensorSharp Chat</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #252525;
  --border: #333;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #6c8cff;
  --accent-hover: #8da6ff;
  --user-bg: #1e2a42;
  --assist-bg: #1a1a1a;
  --danger: #e55;
  --success: #5b5;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

header h1 .icon { font-size: 22px; }

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-badge {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text2);
}

.status-badge.loaded {
  background: #1a3a1a;
  color: var(--success);
}

button {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

button:hover { background: #333; border-color: #444; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

button.primary:hover { background: var(--accent-hover); }

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#model-panel {
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: none;
}

#model-panel.visible { display: block; }

.model-panel-inner {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

#model-panel select, #model-panel input {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
}

#model-panel select { min-width: 280px; }

#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  gap: 12px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.message.user .avatar {
  background: var(--accent);
}

.message.assistant .avatar {
  background: var(--surface2);
  border: 1px solid var(--border);
}

.bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.6;
  font-size: 14px;
  max-width: 85%;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bg);
  border: 1px solid #2a3a5a;
}

.message.assistant .bubble {
  background: var(--assist-bg);
  border: 1px solid var(--border);
}

.bubble .media-preview {
  margin-bottom: 8px;
}

.bubble .media-preview img,
.bubble .media-preview video {
  max-width: 300px;
  max-height: 200px;
  border-radius: 8px;
  display: block;
}

.bubble .media-preview .audio-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text2);
}

.queue-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #1e2a42;
  border: 1px solid #2a3a5a;
  border-radius: 8px;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 8px;
  animation: fadeIn 0.3s ease;
}

.queue-indicator .queue-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text2);
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

.model-label {
  font-size: 10px;
  color: var(--accent);
  opacity: 0.7;
  margin-bottom: 4px;
}

.stats {
  font-size: 11px;
  color: var(--text2);
  margin-top: 6px;
}

#input-area {
  padding: 16px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 10px;
  max-width: 800px;
  margin: 0 auto;
  align-items: flex-end;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

#message-input {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 12px 16px;
  padding-right: 100px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 48px;
  max-height: 200px;
  line-height: 1.5;
  outline: none;
  transition: border-color 0.15s;
}

#message-input:focus { border-color: var(--accent); }

#message-input::placeholder { color: var(--text2); }

.input-actions {
  position: absolute;
  right: 8px;
  bottom: 8px;
  display: flex;
  gap: 4px;
}

.input-actions button {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  background: transparent;
  color: var(--text2);
}

.input-actions button:hover {
  background: var(--surface);
  color: var(--text);
}

.input-actions button.send-btn {
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  padding: 6px 14px;
}

.input-actions button.send-btn:hover { background: var(--accent-hover); }

.input-actions button.stop-btn {
  background: var(--danger);
  color: #fff;
  font-size: 14px;
  padding: 6px 14px;
  animation: pulseStop 1.5s ease-in-out infinite;
}

.input-actions button.stop-btn:hover { background: #f66; }

@keyframes pulseStop {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

#file-input { display: none; }

.model-switcher {
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 800px;
  margin: 0 auto 6px auto;
  font-size: 12px;
  color: var(--text2);
}

.model-switcher label {
  white-space: nowrap;
}

.model-switcher select {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  flex: 1;
  min-width: 0;
  max-width: 320px;
  cursor: pointer;
}

.model-switcher select:hover { border-color: #444; }
.model-switcher select:focus { border-color: var(--accent); outline: none; }

.model-switcher .switch-indicator {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #3a2a1a;
  color: #fa5;
  display: none;
  white-space: nowrap;
}

.model-switcher .switch-indicator.visible { display: inline; }

.attachments {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  flex-wrap: wrap;
}

.attachment-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
}

.attachment-chip img {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  object-fit: cover;
}

.attachment-chip .remove {
  cursor: pointer;
  color: var(--danger);
  font-size: 14px;
  margin-left: 2px;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  gap: 16px;
  text-align: center;
  padding: 40px;
}

.empty-state .big-icon { font-size: 48px; opacity: 0.3; }

.empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.visible { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-width: 400px;
  max-width: 500px;
}

.modal h2 {
  font-size: 16px;
  margin-bottom: 16px;
}

.modal .field {
  margin-bottom: 12px;
}

.modal label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
}

.modal select, .modal input[type="text"] {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
}

.modal .actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}
</style>
</head>
<body>

<header>
  <h1><span class="icon">&#x2B22;</span> TensorSharp Chat</h1>
  <div class="header-controls">
    <span id="queue-badge" class="status-badge" style="display:none" title="Request queue status"></span>
    <span id="status-badge" class="status-badge">No model loaded</span>
    <button id="btn-settings" title="Settings">&#x2699;</button>
    <button id="btn-clear" title="New chat">&#x2795; New Chat</button>
  </div>
</header>

<div class="main-area">
  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">&#x2B22;</div>
      <p>Load a model and start chatting. You can attach images, videos, and audio files for multimodal inference.</p>
      <button class="primary" onclick="showSettings()">Load Model</button>
    </div>
  </div>

  <div id="input-area">
    <div class="attachments" id="attachments"></div>
    <div class="model-switcher" id="model-switcher">
      <label>Model:</label>
      <select id="inline-model-select"><option value="">Loading...</option></select>
      <span class="switch-indicator" id="switch-indicator">will switch model</span>
    </div>
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <div class="input-actions">
          <button onclick="document.getElementById('file-input').click()" title="Attach file">&#x1F4CE;</button>
          <button class="send-btn" id="btn-send" onclick="sendMessage()">&#x27A4;</button>
        </div>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*,video/*,audio/*" onchange="handleFileSelect(event)">
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>Load Model</h2>
    <div class="field">
      <label>Model</label>
      <select id="model-select"><option>Loading...</option></select>
    </div>
    <div class="field">
      <label>Backend</label>
      <select id="backend-select">
        <option value="ggml_metal">GGML Metal (GPU)</option>
        <option value="ggml_cpu">GGML CPU</option>
        <option value="cpu">CPU</option>
      </select>
    </div>
    <div class="field">
      <label>Max Tokens</label>
      <input type="text" id="max-tokens" value="200">
    </div>
    <div class="actions">
      <button onclick="hideSettings()">Cancel</button>
      <button class="primary" id="btn-load" onclick="loadModel()">Load</button>
    </div>
  </div>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const messageInput = document.getElementById('message-input');
const statusBadge = document.getElementById('status-badge');
const emptyState = document.getElementById('empty-state');
const attachmentsDiv = document.getElementById('attachments');

let chatHistory = [];
let pendingAttachments = [];
let isGenerating = false;
let currentAbortController = null;
let currentLoadedModel = null;
let availableModels = [];

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
});

document.getElementById('btn-settings').onclick = showSettings;
document.getElementById('btn-clear').onclick = clearChat;

function showSettings() {
  document.getElementById('settings-modal').classList.add('visible');
  fetchModels();
}

function hideSettings() {
  document.getElementById('settings-modal').classList.remove('visible');
}

async function fetchModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    availableModels = data.models || [];

    const select = document.getElementById('model-select');
    select.innerHTML = '';
    if (availableModels.length === 0) {
      select.innerHTML = '<option>No .gguf files found in model directory</option>';
      return;
    }
    availableModels.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      if (m === data.loaded) opt.selected = true;
      select.appendChild(opt);
    });

    if (data.loaded) currentLoadedModel = data.loaded;
    populateInlineModelSelect();
  } catch (e) {
    console.error('Failed to fetch models:', e);
  }
}

function populateInlineModelSelect() {
  const sel = document.getElementById('inline-model-select');
  sel.innerHTML = '';
  if (availableModels.length === 0) {
    sel.innerHTML = '<option value="">No models</option>';
    return;
  }
  availableModels.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m.replace(/\.gguf$/i, '');
    if (m === currentLoadedModel) opt.selected = true;
    sel.appendChild(opt);
  });
  updateSwitchIndicator();
}

document.getElementById('inline-model-select').addEventListener('change', updateSwitchIndicator);

function updateSwitchIndicator() {
  const sel = document.getElementById('inline-model-select');
  const indicator = document.getElementById('switch-indicator');
  const selected = sel.value;
  if (currentLoadedModel && selected && selected !== currentLoadedModel) {
    indicator.classList.add('visible');
  } else {
    indicator.classList.remove('visible');
  }
}

async function loadModel() {
  const model = document.getElementById('model-select').value;
  const backend = document.getElementById('backend-select').value;
  const btn = document.getElementById('btn-load');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    const res = await fetch('/api/models/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, backend })
    });
    const data = await res.json();
    if (data.ok) {
      currentLoadedModel = data.model;
      statusBadge.textContent = data.model + ' (' + (data.architecture || '?') + ')';
      statusBadge.classList.add('loaded');
      populateInlineModelSelect();
      hideSettings();
      clearChat();
    } else {
      alert('Failed to load: ' + data.error);
    }
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Load';
  }
}

function clearChat() {
  chatHistory = [];
  pendingAttachments = [];
  attachmentsDiv.innerHTML = '';
  chatContainer.innerHTML = '';
  if (!statusBadge.classList.contains('loaded')) {
    chatContainer.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="big-icon">&#x2B22;</div>
        <p>Load a model and start chatting. You can attach images, videos, and audio files for multimodal inference.</p>
        <button class="primary" onclick="showSettings()">Load Model</button>
      </div>`;
  } else {
    chatContainer.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">&#x1F4AC;</div>
        <p>Start a conversation. You can switch models at any turn using the dropdown below, or attach images, videos, and audio files.</p>
      </div>`;
  }
}

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.ok) {
      pendingAttachments.push(data);
      renderAttachments();
    } else {
      alert('Upload failed: ' + data.error);
    }
  } catch (e) {
    alert('Upload error: ' + e.message);
  }
}

function renderAttachments() {
  attachmentsDiv.innerHTML = '';
  pendingAttachments.forEach((att, idx) => {
    const chip = document.createElement('div');
    chip.className = 'attachment-chip';
    let icon = '&#x1F4C4;';
    if (att.mediaType === 'image') icon = '&#x1F5BC;';
    else if (att.mediaType === 'video') icon = '&#x1F3AC;';
    else if (att.mediaType === 'audio') icon = '&#x1F3B5;';
    chip.innerHTML = `${icon} ${att.fileName} <span class="remove" onclick="removeAttachment(${idx})">&times;</span>`;
    attachmentsDiv.appendChild(chip);
  });
}

function removeAttachment(idx) {
  pendingAttachments.splice(idx, 1);
  renderAttachments();
}

async function sendMessage() {
  if (isGenerating) return;
  const text = messageInput.value.trim();
  if (!text && pendingAttachments.length === 0) return;
  const selectedModel = document.getElementById('inline-model-select').value;
  if (!statusBadge.classList.contains('loaded') && !selectedModel) {
    showSettings();
    return;
  }

  const userContent = text || describeAttachments();
  const msg = { role: 'user', content: userContent };

  const imagePaths = [];
  const audioPaths = [];
  let isVideo = false;
  const attachmentsCopy = [...pendingAttachments];

  attachmentsCopy.forEach(att => {
    if (att.mediaType === 'image') {
      imagePaths.push(att.path);
    } else if (att.mediaType === 'video') {
      isVideo = true;
      if (att.framePaths) att.framePaths.forEach(f => imagePaths.push(f));
    } else if (att.mediaType === 'audio') {
      audioPaths.push(att.path);
    }
  });

  if (imagePaths.length > 0) msg.imagePaths = imagePaths;
  if (audioPaths.length > 0) msg.audioPaths = audioPaths;
  if (isVideo) msg.isVideo = true;

  chatHistory.push(msg);
  addUserBubble(userContent, attachmentsCopy);
  messageInput.value = '';
  messageInput.style.height = 'auto';
  pendingAttachments = [];
  attachmentsDiv.innerHTML = '';

  const empt = chatContainer.querySelector('.empty-state');
  if (empt) empt.remove();

  isGenerating = true;
  currentAbortController = new AbortController();
  setSendButtonState(true);

  const assistDiv = addAssistantBubble();
  const bubbleText = assistDiv.querySelector('.bubble-text');
  const statsDiv = assistDiv.querySelector('.stats');
  const queueDiv = assistDiv.querySelector('.queue-indicator');

  let fullText = '';
  let wasAborted = false;

  try {
    const maxTokens = parseInt(document.getElementById('max-tokens').value) || 200;
    const chatPayload = { messages: chatHistory, maxTokens };
    if (selectedModel) chatPayload.model = selectedModel;
    const backendSel = document.getElementById('backend-select');
    if (backendSel) chatPayload.backend = backendSel.value;

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(chatPayload),
      signal: currentAbortController.signal
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let queueCleared = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.queue_position !== undefined) {
            if (queueDiv) {
              queueDiv.style.display = 'inline-flex';
              queueDiv.textContent = '';
              const spinner = document.createElement('div');
              spinner.className = 'queue-spinner';
              queueDiv.appendChild(spinner);
              const txt = document.createElement('span');
              txt.textContent = data.queue_position === 1
                ? 'Next in queue (1 request ahead)'
                : `Position ${data.queue_position} in queue (${data.queue_position} requests ahead)`;
              queueDiv.appendChild(txt);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            continue;
          }
          if (data.model_loading) {
            if (queueDiv) {
              queueDiv.style.display = 'inline-flex';
              queueDiv.textContent = '';
              const spinner = document.createElement('div');
              spinner.className = 'queue-spinner';
              queueDiv.appendChild(spinner);
              const txt = document.createElement('span');
              txt.textContent = 'Loading model: ' + data.model_loading + '...';
              queueDiv.appendChild(txt);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            continue;
          }
          if (data.model_loaded) {
            currentLoadedModel = data.model_loaded;
            statusBadge.textContent = data.model_loaded + ' (' + (data.architecture || '?') + ')';
            statusBadge.classList.add('loaded');
            populateInlineModelSelect();
            continue;
          }
          if (!queueCleared && queueDiv) {
            queueDiv.style.display = 'none';
            queueCleared = true;
          }
          if (data.token) {
            fullText += data.token;
            bubbleText.textContent = fullText;
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
          if (data.done) {
            statsDiv.textContent = `${data.tokenCount} tokens \u00B7 ${data.elapsed.toFixed(1)}s \u00B7 ${data.tokPerSec.toFixed(1)} tok/s`;
          }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      wasAborted = true;
      statsDiv.textContent = 'Stopped by user';
    } else {
      bubbleText.textContent = 'Error: ' + e.message;
    }
  } finally {
    if (fullText) {
      chatHistory.push({ role: 'assistant', content: fullText });
    }
    isGenerating = false;
    currentAbortController = null;
    setSendButtonState(false);
    const indicator = assistDiv.querySelector('.typing-indicator');
    if (indicator) indicator.remove();
    const queueInd = assistDiv.querySelector('.queue-indicator');
    if (queueInd) queueInd.style.display = 'none';
  }
}

function abortGeneration() {
  if (currentAbortController) {
    currentAbortController.abort();
  }
}

function setSendButtonState(generating) {
  const btn = document.getElementById('btn-send');
  if (generating) {
    btn.className = 'stop-btn';
    btn.innerHTML = '&#x25A0;';
    btn.setAttribute('onclick', 'abortGeneration()');
    btn.title = 'Stop generating';
  } else {
    btn.className = 'send-btn';
    btn.innerHTML = '&#x27A4;';
    btn.setAttribute('onclick', 'sendMessage()');
    btn.title = 'Send message';
  }
}

function describeAttachments() {
  const types = pendingAttachments.map(a => a.mediaType);
  if (types.includes('video')) return 'What is happening in this video?';
  if (types.includes('audio')) return 'Listen to this audio and describe what you hear.';
  if (types.includes('image')) return 'What is in this image?';
  return 'Describe the attached file.';
}

function addUserBubble(text, attachments) {
  const div = document.createElement('div');
  div.className = 'message user';

  let mediaHtml = '';
  attachments.forEach(att => {
    if (att.mediaType === 'image') {
      mediaHtml += `<div class="media-preview"><img src="/uploads/${att.path.split('/').pop()}" alt="uploaded"></div>`;
    } else if (att.mediaType === 'video') {
      mediaHtml += `<div class="media-preview"><div class="audio-label">&#x1F3AC; ${att.fileName}</div></div>`;
    } else if (att.mediaType === 'audio') {
      mediaHtml += `<div class="media-preview"><div class="audio-label">&#x1F3B5; ${att.fileName}</div></div>`;
    }
  });

  div.innerHTML = `
    <div class="avatar">U</div>
    <div class="bubble">${mediaHtml}${escapeHtml(text)}</div>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addAssistantBubble() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  const selectedModel = document.getElementById('inline-model-select').value || currentLoadedModel || '';
  const modelDisplay = selectedModel.replace(/\.gguf$/i, '');
  div.innerHTML = `
    <div class="avatar">&#x2B22;</div>
    <div class="bubble">
      <div class="model-label">${escapeHtml(modelDisplay)}</div>
      <div class="queue-indicator" style="display:none"><div class="queue-spinner"></div><span>Waiting in queue...</span></div>
      <span class="bubble-text"></span>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
      <div class="stats"></div>
    </div>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

fetchModels().then(() => {
  fetch('/api/models').then(r => r.json()).then(data => {
    if (data.loaded) {
      currentLoadedModel = data.loaded;
      statusBadge.textContent = data.loaded + ' (' + (data.architecture || '?') + ')';
      statusBadge.classList.add('loaded');
      populateInlineModelSelect();
    }
  });
});

const queueBadge = document.getElementById('queue-badge');

async function pollQueueStatus() {
  try {
    const res = await fetch('/api/queue/status');
    const data = await res.json();
    if (data.pending_requests > 0 || data.busy) {
      queueBadge.style.display = '';
      if (data.pending_requests > 0) {
        queueBadge.textContent = `Queue: ${data.pending_requests} waiting`;
        queueBadge.style.background = '#3a2a1a';
        queueBadge.style.color = '#fa5';
      } else {
        queueBadge.textContent = 'Queue: processing';
        queueBadge.style.background = '#1a3a1a';
        queueBadge.style.color = '#5b5';
      }
    } else {
      queueBadge.style.display = 'none';
    }
  } catch {}
}

setInterval(pollQueueStatus, 2000);
</script>
</body>
</html>
