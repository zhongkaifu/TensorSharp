<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TensorSharp Chat</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #252525;
  --border: #333;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #6c8cff;
  --accent-hover: #8da6ff;
  --user-bg: #1e2a42;
  --assist-bg: #1a1a1a;
  --danger: #e55;
  --success: #5b5;
  --radius: 12px;
  --layout-gutter: clamp(12px, 2vw, 20px);
  --chat-shell-max-width: min(1180px, calc(100vw - 32px));
  --user-avatar-size: 40px;
  --assistant-avatar-size: 72px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.brand-logo {
  height: 56px;
  width: auto;
  display: block;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.35));
}

.brand-text {
  white-space: nowrap;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: flex-end;
  margin-left: auto;
}

.status-badge {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text2);
}

.status-badge.loaded {
  background: #1a3a1a;
  color: var(--success);
}

button {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

button:hover { background: #333; border-color: #444; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

button.primary:hover { background: var(--accent-hover); }

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#model-panel {
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: none;
}

#model-panel.visible { display: block; }

.model-panel-inner {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

#model-panel select, #model-panel input {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
}

#model-panel select { min-width: 280px; }

#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px var(--layout-gutter);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  gap: 12px;
  max-width: var(--chat-shell-max-width);
  width: 100%;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: var(--user-avatar-size);
  height: var(--user-avatar-size);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
}

.message.user .avatar {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}

.message.assistant .avatar {
  width: var(--assistant-avatar-size);
  height: var(--assistant-avatar-size);
  margin-top: 0;
  padding: 6px;
  border-radius: 20px;
  background: radial-gradient(circle at top, #2a3353 0%, #151515 72%);
  border: 1px solid rgba(140, 166, 255, 0.22);
  box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
}

.message.assistant .avatar img {
  object-position: center top;
  transform: scale(1.05);
  filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.34)) contrast(1.08) saturate(1.06);
}

.message.assistant .bubble {
  max-width: calc(100% - var(--assistant-avatar-size) - 18px);
}

.bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.6;
  font-size: 14px;
  max-width: 85%;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bg);
  border: 1px solid #2a3a5a;
}

.message.assistant .bubble {
  background: var(--assist-bg);
  border: 1px solid var(--border);
}

.bubble .media-preview {
  margin-bottom: 8px;
}

.bubble .media-preview img,
.bubble .media-preview video {
  max-width: 300px;
  max-height: 200px;
  border-radius: 8px;
  display: block;
}

.bubble .media-preview .audio-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text2);
}

.queue-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #1e2a42;
  border: 1px solid #2a3a5a;
  border-radius: 8px;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 8px;
  animation: fadeIn 0.3s ease;
}

.queue-indicator .queue-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text2);
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

.model-label {
  font-size: 10px;
  color: var(--accent);
  opacity: 0.7;
  margin-bottom: 4px;
}

.stats {
  font-size: 11px;
  color: var(--text2);
  margin-top: 6px;
}

#input-area {
  padding: 16px var(--layout-gutter);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 10px;
  max-width: var(--chat-shell-max-width);
  margin: 0 auto;
  align-items: flex-end;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

#message-input {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 12px 16px;
  padding-right: 100px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 48px;
  max-height: 200px;
  line-height: 1.5;
  outline: none;
  transition: border-color 0.15s;
}

#message-input:focus { border-color: var(--accent); }

#message-input::placeholder { color: var(--text2); }

.input-actions {
  position: absolute;
  right: 8px;
  bottom: 8px;
  display: flex;
  gap: 4px;
}

.input-actions button {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  background: transparent;
  color: var(--text2);
}

.input-actions button:hover {
  background: var(--surface);
  color: var(--text);
}

.input-actions button.send-btn {
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  padding: 6px 14px;
}

.input-actions button.send-btn:hover { background: var(--accent-hover); }

.input-actions button.stop-btn {
  background: var(--danger);
  color: #fff;
  font-size: 14px;
  padding: 6px 14px;
  animation: pulseStop 1.5s ease-in-out infinite;
}

.input-actions button.stop-btn:hover { background: #f66; }

@keyframes pulseStop {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

#file-input { display: none; }

.model-switcher {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: var(--chat-shell-max-width);
  margin: 0 auto 6px auto;
  font-size: 12px;
  color: var(--text2);
  flex-wrap: wrap;
}

.model-readout {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.model-readout-label {
  white-space: nowrap;
}

.model-value {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  color: var(--text);
  max-width: min(420px, 100%);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.model-value.empty {
  color: var(--text2);
}

.settings-hint {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
}

.reasoning-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-left: 8px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
}

.reasoning-toggle input[type="checkbox"] { display: none; }

.reasoning-toggle .toggle-track {
  width: 32px;
  height: 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  position: relative;
  transition: background 0.2s, border-color 0.2s;
}

.reasoning-toggle .toggle-track::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 12px;
  height: 12px;
  background: var(--text2);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}

.reasoning-toggle input:checked + .toggle-track {
  background: #1e3a5a;
  border-color: var(--accent);
}

.reasoning-toggle input:checked + .toggle-track::after {
  transform: translateX(14px);
  background: var(--accent);
}

.thinking-block {
  background: #1a1a2a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}

.thinking-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  user-select: none;
}

.thinking-header:hover { background: #222238; }

.thinking-header .arrow {
  font-size: 10px;
  transition: transform 0.2s;
}

.thinking-header .arrow.expanded { transform: rotate(90deg); }

.thinking-content {
  padding: 8px 12px 10px;
  font-size: 13px;
  color: #aaa;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  border-top: 1px solid #2a2a4a;
  display: none;
}

.thinking-content.visible { display: block; }

.attachments {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  max-width: var(--chat-shell-max-width);
  margin-left: auto;
  margin-right: auto;
  flex-wrap: wrap;
}

.attachment-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
}

.attachment-chip img {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  object-fit: cover;
}

.attachment-chip .remove {
  cursor: pointer;
  color: var(--danger);
  font-size: 14px;
  margin-left: 2px;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  gap: 16px;
  text-align: center;
  padding: 40px;
}

.empty-state .big-logo {
  width: min(280px, 60vw);
  height: auto;
  display: block;
  filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.28));
}

.empty-state .big-logo.assistant-preview {
  width: min(220px, 48vw);
}

.empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }

@media (max-width: 720px) {
  header {
    padding: 10px 14px;
  }

  header h1 {
    font-size: 16px;
    gap: 10px;
  }

  .brand-logo {
    height: 44px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
  }

  .message.assistant .avatar {
    width: 58px;
    height: 58px;
    border-radius: 18px;
    padding: 5px;
  }

  .message.assistant .bubble {
    max-width: calc(100% - 58px - 14px);
  }

  .empty-state {
    padding: 28px 20px;
  }

  .empty-state .big-logo {
    width: min(220px, 72vw);
  }
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.visible { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-width: 400px;
  max-width: 500px;
}

.modal h2 {
  font-size: 16px;
  margin-bottom: 16px;
}

.modal .field {
  margin-bottom: 12px;
}

.modal label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
}

.modal select, .modal input[type="text"] {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
}

.modal .actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}
</style>
</head>
<body>

<header>
  <h1>
    <img class="brand-logo" src="/images/banner_1.png" alt="TensorSharp logo">
    <span class="brand-text">TensorSharp Chat</span>
  </h1>
  <div class="header-controls">
    <span id="queue-badge" class="status-badge" style="display:none" title="Request queue status"></span>
    <span id="status-badge" class="status-badge">No model loaded</span>
    <button id="btn-settings" title="Settings">&#x2699;</button>
    <button id="btn-clear" title="New chat">&#x2795; New Chat</button>
  </div>
</header>

<div class="main-area">
  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <img class="big-logo" src="/images/banner_1.png" alt="TensorSharp Chat logo">
      <p>Load a model and start chatting. You can attach images, videos, and audio files for multimodal inference.</p>
      <button class="primary" onclick="showSettings()">Load Model</button>
    </div>
  </div>

  <div id="input-area">
    <div class="attachments" id="attachments"></div>
    <div class="model-switcher" id="model-switcher">
      <div class="model-readout">
        <span class="model-readout-label">Model:</span>
        <span class="model-value empty" id="inline-model-name">No model loaded</span>
      </div>
      <label class="reasoning-toggle" title="Enable reasoning / chain-of-thought output">
        <input type="checkbox" id="reasoning-toggle" checked>
        <span class="toggle-track"></span>
        <span>Reasoning</span>
      </label>
    </div>
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <div class="input-actions">
          <button onclick="document.getElementById('file-input').click()" title="Attach file">&#x1F4CE;</button>
          <button class="send-btn" id="btn-send" onclick="sendMessage()">&#x27A4;</button>
        </div>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*,video/*,audio/*" onchange="handleFileSelect(event)">
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>Load Model</h2>
    <div class="field">
      <label>Model</label>
      <select id="model-select"><option>Loading...</option></select>
    </div>
    <div class="field">
      <label>Backend</label>
      <select id="backend-select">
        <option value="">Loading supported backends...</option>
      </select>
    </div>
    <div class="field">
      <label>Max Tokens</label>
      <input type="text" id="max-tokens" value="2000">
    </div>
    <div class="actions">
      <button onclick="hideSettings()">Cancel</button>
      <button class="primary" id="btn-load" onclick="loadModel()">Load</button>
    </div>
    <p class="settings-hint" id="settings-hint">Select a model before starting a chat. The loaded model stays fixed for the conversation.</p>
  </div>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const messageInput = document.getElementById('message-input');
const statusBadge = document.getElementById('status-badge');
const attachmentsDiv = document.getElementById('attachments');

let chatHistory = [];
let pendingAttachments = [];
let isGenerating = false;
let currentAbortController = null;
let currentLoadedModel = null;
let availableModels = [];
let availableBackends = [];
let needsCacheReset = false;

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
});

document.getElementById('btn-settings').onclick = showSettings;
document.getElementById('btn-clear').onclick = clearChat;

function showSettings() {
  document.getElementById('settings-modal').classList.add('visible');
  updateSettingsLockState();
  fetchModels();
}

function hideSettings() {
  document.getElementById('settings-modal').classList.remove('visible');
}

async function fetchModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    availableModels = data.models || [];
    currentLoadedModel = data.loaded || null;
    populateBackendSelect(data.supportedBackends || [], data.loadedBackend || data.defaultBackend);

    const select = document.getElementById('model-select');
    select.innerHTML = '';
    if (availableModels.length === 0) {
      select.innerHTML = '<option>No .gguf files found in model directory</option>';
      updateInlineModelStatus();
      updateSettingsLockState();
      return data;
    }
    availableModels.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      if (m === data.loaded) opt.selected = true;
      select.appendChild(opt);
    });

    updateInlineModelStatus();
    updateSettingsLockState();
    return data;
  } catch (e) {
    console.error('Failed to fetch models:', e);
    return null;
  }
}

function populateBackendSelect(backends, preferredBackend) {
  availableBackends = backends;
  const select = document.getElementById('backend-select');
  const currentValue = select.value;
  select.innerHTML = '';

  if (availableBackends.length === 0) {
    select.innerHTML = '<option value="">No supported backends</option>';
    select.disabled = true;
    return;
  }

  availableBackends.forEach(backend => {
    const opt = document.createElement('option');
    opt.value = backend.value;
    opt.textContent = backend.label;
    select.appendChild(opt);
  });

  select.disabled = false;
  const selectedValue = availableBackends.some(backend => backend.value === currentValue) ? currentValue :
    availableBackends.some(backend => backend.value === preferredBackend) ? preferredBackend :
    availableBackends[0].value;
  select.value = selectedValue;
}

function hasActiveChat() {
  return chatHistory.length > 0;
}

function updateInlineModelStatus() {
  const modelName = document.getElementById('inline-model-name');
  if (!currentLoadedModel) {
    modelName.textContent = 'No model loaded';
    modelName.classList.add('empty');
    return;
  }

  modelName.textContent = currentLoadedModel.replace(/\.gguf$/i, '');
  modelName.classList.remove('empty');
}

function updateSettingsLockState() {
  const lockModelSelection = hasActiveChat();
  const modelSelect = document.getElementById('model-select');
  const backendSelect = document.getElementById('backend-select');
  const loadButton = document.getElementById('btn-load');
  const settingsHint = document.getElementById('settings-hint');

  if (settingsHint) {
    settingsHint.textContent = lockModelSelection
      ? 'Model changes are locked during a conversation. Start a new chat before loading a different model.'
      : 'Select a model before starting a chat. The loaded model stays fixed for the conversation.';
  }

  if (modelSelect) {
    modelSelect.disabled = lockModelSelection || availableModels.length === 0;
  }

  if (backendSelect) {
    backendSelect.disabled = lockModelSelection || availableBackends.length === 0;
  }

  if (loadButton) {
    loadButton.disabled = lockModelSelection || availableModels.length === 0 || availableBackends.length === 0;
  }
}

async function loadModel() {
  if (hasActiveChat()) {
    alert('Start a new chat before changing models.');
    return;
  }

  const model = document.getElementById('model-select').value;
  const backend = document.getElementById('backend-select').value;
  if (!backend) {
    alert('No supported backend is available on this machine.');
    return;
  }
  const btn = document.getElementById('btn-load');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    const res = await fetch('/api/models/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, backend })
    });
    const data = await res.json();
    if (data.ok) {
      currentLoadedModel = data.model;
      statusBadge.textContent = data.model + ' (' + (data.architecture || '?') + ')';
      statusBadge.classList.add('loaded');
      updateInlineModelStatus();
      hideSettings();
      clearChat();
    } else {
      alert('Failed to load: ' + data.error);
    }
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Load';
  }
}

function clearChat() {
  chatHistory = [];
  pendingAttachments = [];
  attachmentsDiv.innerHTML = '';
  chatContainer.innerHTML = '';
  needsCacheReset = true;
  updateSettingsLockState();
  if (!statusBadge.classList.contains('loaded')) {
    chatContainer.innerHTML = `
      <div class="empty-state" id="empty-state">
        <img class="big-logo" src="/images/banner_1.png" alt="TensorSharp Chat logo">
        <p>Load a model and start chatting. You can attach images, videos, and audio files for multimodal inference.</p>
        <button class="primary" onclick="showSettings()">Load Model</button>
      </div>`;
  } else {
    chatContainer.innerHTML = `
      <div class="empty-state">
        <img class="big-logo assistant-preview" src="/images/assistant_logo.png" alt="Assistant icon">
        <p>Start a conversation with the loaded model. To switch models, start a new chat first. You can still attach images, videos, and audio files.</p>
      </div>`;
  }
}

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.ok) {
      pendingAttachments.push(data);
      renderAttachments();
    } else {
      alert('Upload failed: ' + data.error);
    }
  } catch (e) {
    alert('Upload error: ' + e.message);
  }
}

function renderAttachments() {
  attachmentsDiv.innerHTML = '';
  pendingAttachments.forEach((att, idx) => {
    const chip = document.createElement('div');
    chip.className = 'attachment-chip';
    let icon = '&#x1F4C4;';
    if (att.mediaType === 'image') icon = '&#x1F5BC;';
    else if (att.mediaType === 'video') icon = '&#x1F3AC;';
    else if (att.mediaType === 'audio') icon = '&#x1F3B5;';
    chip.innerHTML = `${icon} ${att.fileName} <span class="remove" onclick="removeAttachment(${idx})">&times;</span>`;
    attachmentsDiv.appendChild(chip);
  });
}

function removeAttachment(idx) {
  pendingAttachments.splice(idx, 1);
  renderAttachments();
}

async function sendMessage() {
  if (isGenerating) return;
  const text = messageInput.value.trim();
  if (!text && pendingAttachments.length === 0) return;
  if (!currentLoadedModel) {
    showSettings();
    return;
  }

  const userContent = text || describeAttachments();
  const msg = { role: 'user', content: userContent };

  const imagePaths = [];
  const audioPaths = [];
  let isVideo = false;
  const attachmentsCopy = [...pendingAttachments];

  attachmentsCopy.forEach(att => {
    if (att.mediaType === 'image') {
      imagePaths.push(att.path);
    } else if (att.mediaType === 'video') {
      isVideo = true;
      if (att.framePaths) att.framePaths.forEach(f => imagePaths.push(f));
    } else if (att.mediaType === 'audio') {
      audioPaths.push(att.path);
    }
  });

  if (imagePaths.length > 0) msg.imagePaths = imagePaths;
  if (audioPaths.length > 0) msg.audioPaths = audioPaths;
  if (isVideo) msg.isVideo = true;

  chatHistory.push(msg);
  addUserBubble(userContent, attachmentsCopy);
  messageInput.value = '';
  messageInput.style.height = 'auto';
  pendingAttachments = [];
  attachmentsDiv.innerHTML = '';

  const empt = chatContainer.querySelector('.empty-state');
  if (empt) empt.remove();

  isGenerating = true;
  currentAbortController = new AbortController();
  setSendButtonState(true);

  const assistDiv = addAssistantBubble();
  const bubbleText = assistDiv.querySelector('.bubble-text');
  const statsDiv = assistDiv.querySelector('.stats');
  const queueDiv = assistDiv.querySelector('.queue-indicator');

  let fullText = '';
  let fullThinking = '';
  let wasAborted = false;

  try {
    const maxTokens = parseInt(document.getElementById('max-tokens').value) || 2000;
    const reasoningOn = document.getElementById('reasoning-toggle').checked;
    const chatPayload = { messages: chatHistory, maxTokens, think: reasoningOn };
    if (needsCacheReset) {
      chatPayload.newChat = true;
      needsCacheReset = false;
    }

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(chatPayload),
      signal: currentAbortController.signal
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let queueCleared = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.queue_position !== undefined) {
            if (queueDiv) {
              queueDiv.style.display = 'inline-flex';
              queueDiv.textContent = '';
              const spinner = document.createElement('div');
              spinner.className = 'queue-spinner';
              queueDiv.appendChild(spinner);
              const txt = document.createElement('span');
              txt.textContent = data.queue_position === 1
                ? 'Next in queue (1 request ahead)'
                : `Position ${data.queue_position} in queue (${data.queue_position} requests ahead)`;
              queueDiv.appendChild(txt);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            continue;
          }
          if (!queueCleared && queueDiv) {
            queueDiv.style.display = 'none';
            queueCleared = true;
          }
          if (data.thinking) {
            fullThinking += data.thinking;
            let thinkBlock = assistDiv.querySelector('.thinking-block');
            if (!thinkBlock) {
              thinkBlock = document.createElement('div');
              thinkBlock.className = 'thinking-block';
              const expanded = reasoningOn ? ' expanded' : '';
              const visible = reasoningOn ? ' visible' : '';
              const display = reasoningOn ? '' : ' style="display:none"';
              thinkBlock.innerHTML = `<div class="thinking-header" onclick="toggleThinking(this)"${display}><span class="arrow${expanded}">&#x25B6;</span> Reasoning</div><div class="thinking-content${visible}"></div>`;
              bubbleText.parentNode.insertBefore(thinkBlock, bubbleText);
            }
            const tc = thinkBlock.querySelector('.thinking-content');
            tc.textContent += data.thinking;
            if (reasoningOn) chatContainer.scrollTop = chatContainer.scrollHeight;
          }
          if (data.token) {
            fullText += data.token;
            bubbleText.textContent = fullText;
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
          if (data.done) {
            statsDiv.textContent = `${data.tokenCount} tokens \u00B7 ${data.elapsed.toFixed(1)}s \u00B7 ${data.tokPerSec.toFixed(1)} tok/s`;
          }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      wasAborted = true;
      statsDiv.textContent = 'Stopped by user';
    } else {
      bubbleText.textContent = 'Error: ' + e.message;
    }
  } finally {
    if (fullText) {
      const assistantMessage = { role: 'assistant', content: fullText };
      if (fullThinking) assistantMessage.thinking = fullThinking;
      chatHistory.push(assistantMessage);
    }
    isGenerating = false;
    currentAbortController = null;
    setSendButtonState(false);
    const indicator = assistDiv.querySelector('.typing-indicator');
    if (indicator) indicator.remove();
    const queueInd = assistDiv.querySelector('.queue-indicator');
    if (queueInd) queueInd.style.display = 'none';
  }
}

function abortGeneration() {
  if (currentAbortController) {
    currentAbortController.abort();
  }
}

function setSendButtonState(generating) {
  const btn = document.getElementById('btn-send');
  if (generating) {
    btn.className = 'stop-btn';
    btn.innerHTML = '&#x25A0;';
    btn.setAttribute('onclick', 'abortGeneration()');
    btn.title = 'Stop generating';
  } else {
    btn.className = 'send-btn';
    btn.innerHTML = '&#x27A4;';
    btn.setAttribute('onclick', 'sendMessage()');
    btn.title = 'Send message';
  }
}

function describeAttachments() {
  const types = pendingAttachments.map(a => a.mediaType);
  if (types.includes('video')) return 'What is happening in this video?';
  if (types.includes('audio')) return 'Listen to this audio and describe what you hear.';
  if (types.includes('image')) return 'What is in this image?';
  return 'Describe the attached file.';
}

function addUserBubble(text, attachments) {
  const div = document.createElement('div');
  div.className = 'message user';

  let mediaHtml = '';
  attachments.forEach(att => {
    if (att.mediaType === 'image') {
      mediaHtml += `<div class="media-preview"><img src="/uploads/${att.path.split('/').pop()}" alt="uploaded"></div>`;
    } else if (att.mediaType === 'video') {
      mediaHtml += `<div class="media-preview"><div class="audio-label">&#x1F3AC; ${att.fileName}</div></div>`;
    } else if (att.mediaType === 'audio') {
      mediaHtml += `<div class="media-preview"><div class="audio-label">&#x1F3B5; ${att.fileName}</div></div>`;
    }
  });

  div.innerHTML = `
    <div class="avatar">U</div>
    <div class="bubble">${mediaHtml}${escapeHtml(text)}</div>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addAssistantBubble() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  const modelDisplay = (currentLoadedModel || '').replace(/\.gguf$/i, '');
  div.innerHTML = `
    <div class="avatar"><img src="/images/assistant_logo.png" alt=""></div>
    <div class="bubble">
      <div class="model-label">${escapeHtml(modelDisplay)}</div>
      <div class="queue-indicator" style="display:none"><div class="queue-spinner"></div><span>Waiting in queue...</span></div>
      <span class="bubble-text"></span>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
      <div class="stats"></div>
    </div>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

function toggleThinking(header) {
  const arrow = header.querySelector('.arrow');
  const content = header.nextElementSibling;
  arrow.classList.toggle('expanded');
  content.classList.toggle('visible');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

fetchModels().then(data => {
  if (data && data.loaded) {
    currentLoadedModel = data.loaded;
    statusBadge.textContent = data.loaded + ' (' + (data.architecture || '?') + ')';
    statusBadge.classList.add('loaded');
    updateInlineModelStatus();
  }
});

const queueBadge = document.getElementById('queue-badge');

async function pollQueueStatus() {
  try {
    const res = await fetch('/api/queue/status');
    const data = await res.json();
    if (data.pending_requests > 0 || data.busy) {
      queueBadge.style.display = '';
      if (data.pending_requests > 0) {
        queueBadge.textContent = `Queue: ${data.pending_requests} waiting`;
        queueBadge.style.background = '#3a2a1a';
        queueBadge.style.color = '#fa5';
      } else {
        queueBadge.textContent = 'Queue: processing';
        queueBadge.style.background = '#1a3a1a';
        queueBadge.style.color = '#5b5';
      }
    } else {
      queueBadge.style.display = 'none';
    }
  } catch {}
}

setInterval(pollQueueStatus, 2000);
</script>
</body>
